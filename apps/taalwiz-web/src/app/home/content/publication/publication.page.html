<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <app-back-button></app-back-button>
    </ion-buttons>
    <ion-title>{{ publicationTitle() }}</ion-title>
    <ion-buttons slot="end">
      <ion-button
        (click)="cacheAll()"
        [disabled]="cacheStatus() === 'caching'"
        aria-label="Cache all articles">
        <ion-icon
          slot="icon-only"
          [name]="cacheStatus() === 'done' ? 'checkmark-circle-outline' : 'cloud-download-outline'">
        </ion-icon>
      </ion-button>
    </ion-buttons>
    @if (cacheStatus() === 'caching') {
      <ion-progress-bar
        [value]="topics().length > 0 ? cachedCount() / topics().length : 0">
      </ion-progress-bar>
    }
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="content-container">
    <ion-list>
      @for (topic of topics(); track topic._id) {
      <!-- Strip .md so the URL has no file extension; dev-server historyApiFallback skips
           extension-like paths and serves 404 instead of index.html on live reload. -->
      <ion-item
        detail
        button
        [routerLink]="['/', 'home', 'tabs',  'content', 'article', topic.filename.replace('.md', '')]">
        <ion-label>
          <h2>{{ topic.title }}</h2>
          <p>{{ topic.subtitle }}</p>
        </ion-label>
      </ion-item>
      }
    </ion-list>
  </div>
</ion-content>
