<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <app-back-button></app-back-button>
    </ion-buttons>
    @if (article()) {
    <ion-title>{{ article().title }}</ion-title>
    }
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="content-container noselect">
    @if (article()) {
    <app-article-body
      [article]="article()"
      (clicked)="onClicked($event)"></app-article-body>
    }
  </div>
</ion-content>
