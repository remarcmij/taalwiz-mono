@for (item of displayLemmas(); let idx = $index; track idx) {
  <div
    class="noselect markdown-body text-content"
    [class.is-supplement]="item.lemma.isSupplement"
    [class.homonym-start]="item.newHomonym"
    [innerHTML]="convertMarkdown(item.lemma.text)"
    (click)="clicked.emit($event)"
  ></div>
}
